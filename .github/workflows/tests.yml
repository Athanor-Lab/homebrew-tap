name: brew test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Register this checkout as a tap
        run: |
          set -euo pipefail
          tap="$(brew --repository)/Library/Taps/athanor-lab/homebrew-tap"
          mkdir -p "$(dirname "$tap")"
          ln -s "$GITHUB_WORKSPACE" "$tap"
          brew tap

      - name: Install from source
        run: brew install --build-from-source --verbose athanor-lab/tap/hyperflux

      - name: Test
        run: brew test athanor-lab/tap/hyperflux

      - name: Audit
        run: brew audit --strict athanor-lab/tap/hyperflux || true
